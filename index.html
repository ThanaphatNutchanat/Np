<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ของที่รักเปาคนเดียว💕🐇🥰</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#111;
}

/* ===== Gallery ===== */
.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
    padding:5px;
}

.gallery img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:5px;
    cursor:pointer;
}

.video-item{
    position:relative;
    cursor:pointer;
}

.video-item video{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:5px;
}

/* ปุ่ม ▶ */
.video-item::after{
    content:"▶";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:white;
    background:rgba(0,0,0,0.5);
    width:60px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    opacity:1;
    transition:opacity 0.2s;
}

.video-item.hide-play::after{
    opacity:0;
    pointer-events:none;
}

/* ===== Viewer ===== */
.viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.viewer img, .viewer video{
    max-width:100%;
    max-height:100%;
    transition:opacity 0.3s ease;
}

.closeBtn{
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    color:white;
    cursor:pointer;
    background:rgba(0,0,0,0.5);
    padding:5px 10px;
    border-radius:50%;
}

/* ===== Responsive มือถือ ===== */
@media (max-width:600px){  
    .gallery{
        grid-template-columns:repeat(2,1fr);
        gap:2px;
    }
    .gallery img,
    .video-item video{
        height:auto;
        aspect-ratio:4/3; /* เหมือนอัลบั้มมือถือ */
    }
    .closeBtn{
        font-size:40px;
        padding:10px 15px;
    }
}
</style>
</head>

<body>

<div class="gallery">
    <img src="1773683290468.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20260222_150050.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20260222_150056.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20260227_174935.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20260227_175039.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20260319_020123.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20250630_100512.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20250630_100532.jpg" loading="lazy" onclick="openImg(this.src)">
    <img src="IMG_20250630_101003.jpg" loading="lazy" onclick="openImg(this.src)">
    <div class="video-item" onclick="openVideo(this.querySelector('video').src)">
        <video src="VID_20260124_213016_1.mp4" muted></video>
    </div>
    <div class="video-item" onclick="openVideo(this.querySelector('video').src)">
        <video src="VID_20260218_071708.mp4" muted></video>
    </div>
</div>

<div class="viewer" id="viewer">
    <span class="closeBtn" onclick="closeAll()">✕</span>
    <img id="bigImg">
    <video id="bigVideo" controls style="display:none;"></video>
</div>

<script>
let items = document.querySelectorAll(".gallery img, .video-item video");
let videoItems = document.querySelectorAll(".video-item");
let currentIndex = 0;
let viewer = document.getElementById("viewer");

// เปิดรูป
function openImg(src){
    currentIndex = [...items].findIndex(el => el.src.includes(src));
    viewer.style.display="flex";
    let bigImg = document.getElementById("bigImg");
    let bigVideo = document.getElementById("bigVideo");
    bigImg.src = src;
    bigImg.style.display="block";
    bigVideo.style.display="none";
    bigImg.style.opacity = 0;
    setTimeout(()=>{ bigImg.style.opacity = 1; },50);
    hidePlayButtons();
}

// เปิดวิดีโอ
function openVideo(src){
    currentIndex = [...items].findIndex(el => el.src.includes(src));
    viewer.style.display="flex";
    let bigImg = document.getElementById("bigImg");
    let bigVideo = document.getElementById("bigVideo");
    bigImg.style.display="none";
    bigVideo.style.display="block";
    bigVideo.src = src;
    bigVideo.play();
    bigVideo.style.opacity = 0;
    setTimeout(()=>{ bigVideo.style.opacity = 1; },50);
    hidePlayButtons();
}

// ปิด viewer
function closeAll(){
    viewer.style.display="none";
    let video = document.getElementById("bigVideo");
    video.pause();
    video.currentTime=0;
    showPlayButtons();
}

// ปุ่ม ▶
function hidePlayButtons(){ videoItems.forEach(v=>v.classList.add("hide-play")); }
function showPlayButtons(){ videoItems.forEach(v=>v.classList.remove("hide-play")); }

// Swipe ซ้ายขวา
let startX=0;
viewer.addEventListener("touchstart", e=>startX=e.touches[0].clientX);
viewer.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;
    if(startX - endX > 50) nextMedia();
    else if(endX - startX > 50) prevMedia();
});

// สลับ media
function nextMedia(){ currentIndex=(currentIndex+1)%items.length; openItem(items[currentIndex]); }
function prevMedia(){ currentIndex=(currentIndex-1+items.length)%items.length; openItem(items[currentIndex]); }
function openItem(el){ if(el.tagName==="IMG") openImg(el.src); else openVideo(el.src); }

// ESC ปิด
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeAll(); });

// กด media ไม่ปิด
document.getElementById("bigImg").addEventListener("click", e=>e.stopPropagation());
document.getElementById("bigVideo").addEventListener("click", e=>e.stopPropagation());
viewer.addEventListener("click", closeAll);
</script>

</body>
</html>
